<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الشركة - نظام الطلبات</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- iOS Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="WolfOrder">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
  
  <!-- Theme color -->
  <meta name="theme-color" content="#3498db">
  
  
</head>
<body>
  <div class="dashboard-header">
    <h1>🏢 لوحة الشركة</h1>
    <div class="user-info">
      <span id="userNameDisplay"></span>
      <button id="contactAdminBtn" class="btn btn-sm btn-success" style="background-color: #25D366; border:none;">📞 واتساب المدير</button>
      <button class="btn btn-secondary btn-sm" onclick="logout()">تسجيل الخروج</button>
      <button class="btn btn-sm btn-secondary" onclick="toggleDarkMode(event)">🌙</button>
    </div>
  </div>
  
<div class="card">
  <h2>➕ إنشاء طلب جديد</h2>
  <form id="createOrderForm">
    <div class="form-row">
      <div class="form-group"><label for="orderNumber">رقم الطلب *</label><input type="text" id="orderNumber" required></div>
      <div class="form-group"><label for="customerName">اسم العميل *</label><input type="text" id="customerName" required></div>
      <div class="form-group"><label for="customerNumber">رقم العميل</label><input type="text" id="customerNumber" pattern="\d{10}" title="يجب إدخال 10 أرقام"></div>
      <div class="form-group"><label for="address">العنوان *</label><input type="text" id="address" required></div>
    </div>
    <div class="form-row">
      <div class="form-group" style="max-width: 150px;"><label for="price">السعر *</label><input id="price" required ></div>
      <div class="form-group" style="max-width: 100px;"><label for="currency">العملة</label><select id="currency" ><option value="ل.س" selected>ل.س</option><option value="دولار">دولار</option></select></div>
    </div>
    <button type="submit" class="btn btn-primary">إنشاء الطلب</button>
  </form>
</div>

  <div class="card">
    <h2>📋 طلبات الشركة</h2>
    <div class="filters-section">

<div class="form-group">
      <label for="searchInput">🔍 بحث</label>
      <input type="text" id="searchInput" placeholder="ابحث عن طلب..." style="min-width:200px;">
    </div>
    <div class="form-group">
      <label for="filterStatus">الحالة</label>
      <select id="filterStatus">
        <option value="">الكل</option>
        <option value="تم">تم</option>
        <option value="مؤجل">مؤجل</option>
        <option value="مرتجع">مرتجع</option>
        <option value="إلغاء">إلغاء</option>
      </select>
    </div>
     <div class="form-group">
        <label for="startDate">من تاريخ</label>
          <input type="date" id="startDate">
      </div>
      <div class="form-group">
        <label for="endDate">إلى تاريخ</label>
        <input type="date" id="endDate">
      </div>

    <button class="btn btn-secondary" onclick="fetchOrders()">تطبيق</button>
    <button class="btn btn-secondary" onclick="clearFilters()">مسح الفلاتر</button>
    <span id="lastUpdateTime"></span>
    <button class="btn btn-sm btn-secondary" onclick="fetchOrders()" style="margin-left:10px;">🔄 تحديث الآن</button>
    </div>
    <div class="table-responsive">
      <table id="ordersTable">
        <thead><tr>
          <th>#</th>
          <th>م</th>
          <th>رقم الطلب</th>
          <th>اسم العميل</th>
          <th>رقم العميل</th>
          <th>العنوان</th>
          <th>السعر</th>
          <th>الحالة</th>
          <th>ملاحظة</th>
          <th>التاريخ</th>
          <th>إجراء تعديل</th>
        </tr></thead>
        <tbody id="ordersTableBody"></tbody>


      <tfoot id="ordersTableFoot" >
        <!-- صف إجمالي الليرة السورية -->
        <tr>
          <td colspan="6" style="text-align: right;">إجمالي السعر بالليرة السورية:</td>
          <td id="totalPriceSYR">0 ل.س</td>
          <td colspan="5"></td>
        </tr>
        <!-- صف إجمالي الدولار -->
        <tr>
          <td colspan="6" style="text-align: right;">إجمالي السعر بالدولار:</td>
          <td id="totalPriceUSD">0 $</td>
          <td colspan="5"></td>
        </tr>
 
      </tfoot>

      </table>
    </div>
  </div>

<!-- نافذة طلب التعديل -->
<div id="editRequestModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000;">
  <div class="card" style="max-width:600px;">
    <h3>📝 طلب تعديل الطلب</h3>
    <form id="editRequestForm">
      <input type="hidden" id="requestOrderId">
      <div class="form-row">
        <div class="form-group"><label for="reqOrderNumber">رقم الطلب</label><input type="text" id="reqOrderNumber"></div>
        <div class="form-group"><label for="reqCustomerNumber">رقم العميل</label><input type="text" id="reqCustomerNumber"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label for="reqCustomerName">اسم العميل</label><input type="text" id="reqCustomerName"></div>
        <div class="form-group"><label for="reqAddress">العنوان</label><input type="text" id="reqAddress"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label for="reqPrice">السعر</label><input type="number" step="0.01" id="reqPrice"></div>
        <div class="form-group"><label for="reqCurrency">العملة</label><select id="reqCurrency"><option value="ل.س">ل.س</option><option value="دولار">دولار</option></select></div>
      </div>
      <button type="submit" class="btn btn-primary">إرسال الطلب</button>
      <button type="button" class="btn btn-secondary" onclick="closeEditRequestModal()">إلغاء</button>
    </form>
  </div>
</div>

  <div id="notificationArea"></div>
  
  <script src="js/auth.js"></script>
  <script src="js/company.js"></script>
</body>
</html>
